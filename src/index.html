<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SK Rebirth Optimizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Damage Calculator</h1>
    
    <div class="calculator">
        <label>Attack: <input type="number" id="atk" value="1000"></label><br>
        <label>Buff (%): <input type="number" id="buff" value="0"></label><br>
        <label>Enemy Defense: <input type="number" id="def" value="100"></label><br>
        <button id="calc-btn">Calculate</button>
    </div>

    <div id="result">Result: 0</div>

    <script src="main.js"></script>
</body>
</html>
